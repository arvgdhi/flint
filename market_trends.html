<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flint - Market Trends</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>
  <nav class="topnav">
    <a href="index.html" class="topnav-logo"><i class="fa-solid fa-leaf"></i> <span style="color:#1D9E75">Flint</span></a>
    <div class="topnav-links">
      <a href="investment_allocation_charts.html"><i class="fa-solid fa-chart-pie"></i> Allocation</a>
      <a href="investment_types_explorer.html"><i class="fa-solid fa-compass"></i> Explorer</a>
      <a href="market_trends.html" class="active"><i class="fa-solid fa-chart-line"></i> Trends</a>
      <a href="india_investment_house_timeline.html"><i class="fa-solid fa-house-chimney"></i> Timeline</a>
    </div>
    <button class="hamburger" onclick="document.getElementById('mobile-nav').classList.add('open')"><i class="fa-solid fa-bars"></i></button>
  </nav>
  <div class="mobile-nav-overlay" id="mobile-nav">
    <button class="mobile-nav-close" onclick="document.getElementById('mobile-nav').classList.remove('open')"><i class="fa-solid fa-xmark"></i></button>
    <a href="investment_allocation_charts.html"><i class="fa-solid fa-chart-pie"></i> Allocation</a>
    <a href="investment_types_explorer.html"><i class="fa-solid fa-compass"></i> Explorer</a>
    <a href="market_trends.html" class="active"><i class="fa-solid fa-chart-line"></i> Trends</a>
    <a href="india_investment_house_timeline.html"><i class="fa-solid fa-house-chimney"></i> Timeline</a>
  </div>
  <div class="app-container">
    <main class="main-content">
      <div class="container">
        <div class="dashboard-section">
          <div class="market-header">
            <h2>Market Trends</h2>
            <select id="timeframe-select" class="timeframe-select">
              <option value="lastweek">Last Week</option>
              <option value="ytd">Year to Date</option>
              <option value="1year" selected>Past 1 Year</option>
              <option value="2year">Past 2 Years</option>
            </select>
          </div>
          <div class="chart-grid" id="chart-grid"></div>
        </div>
      </div>
    </main>
  </div>
  <script>
    const tickers=[{id:'nifty',symbol:'NIFTYBEES.BSE',name:'Nifty 50 (Proxy)'},{id:'sensex',symbol:'BSESN',name:'BSE Sensex'},{id:'hdfc',symbol:'HDFCBANK.BSE',name:'HDFC Bank'},{id:'icici',symbol:'ICICIBANK.BSE',name:'ICICI Bank'},{id:'titan',symbol:'TITAN.BSE',name:'Titan Company'},{id:'hul',symbol:'HINDUNILVR.BSE',name:'Hindustan Unilever'},{id:'tcs',symbol:'TCS.BSE',name:'TCS'},{id:'reliance',symbol:'RELIANCE.BSE',name:'Reliance'},{id:'infosys',symbol:'INFY.BSE',name:'Infosys'},{id:'sbi',symbol:'SBIN.BSE',name:'SBI'},{id:'bajaj',symbol:'BAJFINANCE.BSE',name:'Bajaj Finance'},{id:'tatapower',symbol:'TATAPOWER.BSE',name:'Tata Power'}];
    const basePrices={nifty:23500,sensex:77000,hdfc:1650,icici:1200,titan:3800,hul:2500,tcs:4100,reliance:3100,infosys:1550,sbi:900,bajaj:7500,tatapower:450};
    let chartInstances={};
    function initGrid(){const grid=document.getElementById('chart-grid');grid.innerHTML='';tickers.forEach(t=>{grid.innerHTML+=`<div class="av-chart-box"><div class="av-chart-title">${t.name}</div><div class="av-chart-sub">${t.symbol}</div><div class="av-chart-container"><canvas id="chart-${t.id}"></canvas><div id="error-${t.id}" class="av-chart-error" style="display:none;"></div></div></div>`;});}
    function generateDateRangeStr(s,e){const o={year:'numeric',month:'short',day:'numeric'};return `${s.toLocaleDateString('en-US',o)} — ${e.toLocaleDateString('en-US',o)}`;}
    function generateMockData(ticker,timeframe){const end=new Date();const start=new Date();if(timeframe==='lastweek')start.setDate(end.getDate()-7);else if(timeframe==='ytd'){start.setMonth(0);start.setDate(1);}else if(timeframe==='1year')start.setFullYear(end.getFullYear()-1);else if(timeframe==='2year')start.setFullYear(end.getFullYear()-2);const dateRangeStr=generateDateRangeStr(start,end);const diffTime=Math.abs(end-start);const diffDays=Math.ceil(diffTime/(1000*60*60*24));let points=Math.floor(diffDays*(5/7));if(points<5)points=5;let stepSize=1;if(points>100)stepSize=Math.ceil(points/100);const dates=[];const prices=[];let currentPrice=basePrices[ticker.id];let currentDate=new Date(start);let volatility=0.015;if(timeframe==='lastweek')volatility=0.005;if(timeframe==='2year')volatility=0.025;for(let i=0;i<points;i++){while(currentDate.getDay()===0||currentDate.getDay()===6)currentDate.setDate(currentDate.getDate()+1);if(i%stepSize===0||i===points-1){dates.push(currentDate.toISOString().split('T')[0]);currentPrice=currentPrice*(1+(Math.random()-0.48)*volatility);prices.push(parseFloat(currentPrice.toFixed(2)));}currentDate.setDate(currentDate.getDate()+1);}return{dates,prices,dateRangeStr};}
    function renderChart(ticker,data){const timeSeries=data.prices;if(!timeSeries||!timeSeries.length){document.getElementById(`chart-${ticker.id}`).style.display='none';const errEl=document.getElementById(`error-${ticker.id}`);errEl.innerText="Data unavailable.";errEl.style.display='flex';return;}document.getElementById(`error-${ticker.id}`).style.display='none';const ctxContainer=document.getElementById(`chart-${ticker.id}`).parentElement.parentElement;ctxContainer.querySelector('.av-chart-sub').innerText=data.dateRangeStr;const canvas=document.getElementById(`chart-${ticker.id}`);canvas.style.display='block';const dates=data.dates;const prices=data.prices;const isUp=prices[prices.length-1]>=prices[0];const lineColor=isUp?'#1D9E75':'#E24B4A';const fillColor=isUp?'rgba(29,158,117,0.08)':'rgba(226,75,74,0.08)';if(chartInstances[ticker.id])chartInstances[ticker.id].destroy();const ctx=canvas.getContext('2d');chartInstances[ticker.id]=new Chart(ctx,{type:'line',data:{labels:dates,datasets:[{label:'Close Price',data:prices,borderColor:lineColor,backgroundColor:fillColor,borderWidth:2,pointRadius:0,pointHoverRadius:4,fill:true,tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:5,color:'#555',font:{family:"'Space Mono', monospace",size:10}},grid:{display:false}},y:{ticks:{color:'#555',font:{family:"'Space Mono', monospace",size:10}},grid:{color:'#1a1a1a'}}}}});}
    function loadAllCharts(timeframe){const selectEl=document.getElementById('timeframe-select');selectEl.disabled=true;for(const t of tickers){const errEl=document.getElementById(`error-${t.id}`);const canvas=document.getElementById(`chart-${t.id}`);try{if(!chartInstances[t.id]){canvas.style.display='none';errEl.style.display='flex';errEl.style.color='#555';errEl.innerText='Loading...';}const mockData=generateMockData(t,timeframe);renderChart(t,mockData);}catch(e){if(chartInstances[t.id])chartInstances[t.id].destroy();canvas.style.display='none';errEl.style.display='flex';errEl.style.color='#D85A30';errEl.innerHTML='Failed to load ticker data.';}}selectEl.disabled=false;}
    initGrid();loadAllCharts(document.getElementById('timeframe-select').value);
    document.getElementById('timeframe-select').addEventListener('change',e=>loadAllCharts(e.target.value));
  </script>
</body>
</html>
